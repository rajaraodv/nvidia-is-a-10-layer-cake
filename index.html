<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVIDIA Developer Stack — Layered Journey Map</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0a0a0a;
  --ink2: #3a3a3a;
  --ink3: #6e6e6e;
  --ink4: #a8a8a8;
  --rule: #d6d6d6;
  --rule2: #ececec;
  --rule3: #f4f4f4;
  --bg: #ffffff;
  --warn-bg: #fff7e6;
  --warn-bd: #f0c97a;
  --warn-tx: #6f4500;

  /* Per-layer pastel backgrounds — each layer has its own color identity */
  --l-10: #fff4d6; /* warm cream — programs, portals, community */
  --l-09: #ffe1e6; /* rose — applications & verticals */
  --l-08: #d9ecff; /* sky blue — cloud inference APIs */
  --l-07: #e8ddff; /* lavender — self-hosted inference */
  --l-06: #d7f0db; /* mint — models */
  --l-05: #ffe6c9; /* peach — training */
  --l-04: #ffd9cb; /* coral — ML frameworks */
  --l-03: #d4f1ec; /* teal — compute platform (CUDA) */
  --l-02: #ece2cf; /* sand — system software */
  --l-01: #dcdce4; /* stone — hardware */

  --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Inter', Arial, sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace;
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: #efefef;
  color: var(--ink);
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* ───────────────── HEADER ───────────────── */
.hdr {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 16px 28px;
  border-bottom: 2px solid var(--ink);
  flex-shrink: 0;
  background: #fff;
  z-index: 30;
  position: sticky;
  top: 0;
}
.hdr-brand {
  font-weight: 900;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.hdr-title {
  font-size: 12.5px;
  color: var(--ink2);
  font-weight: 500;
}
.hdr-spacer { flex: 1; }
.hdr-count {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink);
}
.hdr-count strong {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.02em;
}
.hdr-hint {
  font-size: 10.5px;
  color: var(--ink3);
  padding: 5px 10px;
  border: 1px solid var(--rule);
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ───────────────── MAIN LAYOUT ───────────────── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* Left rail — sticky vertical layer navigator */
.rail {
  width: 72px;
  flex-shrink: 0;
  background: #fff;
  border-right: 2px solid var(--ink);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 14px 0 14px;
  overflow-y: auto;
  position: relative;
}
.rail-heading {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  text-align: center;
  margin-bottom: 8px;
}
.rail-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 52px;
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 800;
  color: var(--ink2);
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: background 120ms, color 120ms, border-color 120ms;
  cursor: pointer;
  user-select: none;
}
.rail-item:hover { filter: brightness(0.94); color: var(--ink); }
/* Color-coded rail items — match each layer's pastel */
.rail-item[data-jump="10"] { background: var(--l-10); }
.rail-item[data-jump="09"] { background: var(--l-09); }
.rail-item[data-jump="08"] { background: var(--l-08); }
.rail-item[data-jump="07"] { background: var(--l-07); }
.rail-item[data-jump="06"] { background: var(--l-06); }
.rail-item[data-jump="05"] { background: var(--l-05); }
.rail-item[data-jump="04"] { background: var(--l-04); }
.rail-item[data-jump="03"] { background: var(--l-03); }
.rail-item[data-jump="02"] { background: var(--l-02); }
.rail-item[data-jump="01"] { background: var(--l-01); }
.rail-item.active { filter: brightness(0.92); border-left-color: var(--ink); color: var(--ink); }

/* Stack area */
.stack-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  background: #efefef;
}
.stack {
  max-width: 1700px;
  margin: 0 auto;
  background: #fff;
  border-left: 2px solid var(--ink);
  border-right: 2px solid var(--ink);
}

/* ───────────────── LAYER SLAB ───────────────── */
.layer {
  border-bottom: 3px solid var(--ink);
  position: relative;
}
.layer:last-child { border-bottom: none; }

/* Per-layer backgrounds — creates literal "strata" feel */
.layer[data-id="10"] { background: var(--l-10); border-bottom-width: 4px; }
.layer[data-id="09"] { background: var(--l-09); }
.layer[data-id="08"] { background: var(--l-08); }
.layer[data-id="07"] { background: var(--l-07); }
.layer[data-id="06"] { background: var(--l-06); }
.layer[data-id="05"] { background: var(--l-05); }
.layer[data-id="04"] { background: var(--l-04); }
.layer[data-id="03"] { background: var(--l-03); }
.layer[data-id="02"] { background: var(--l-02); }
.layer[data-id="01"] { background: var(--l-01); }

.layer-head {
  position: relative;
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid rgba(0,0,0,0.18);
  min-height: 116px;
}

.layer-num {
  position: absolute;
  top: 16px;
  left: 22px;
  width: 104px;
  height: 84px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 1;
  border: 2.5px solid var(--ink);
  background: rgba(255,255,255,0.7);
  box-shadow: 2px 2px 0 0 var(--ink);
  pointer-events: none;
}
.layer-num-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  color: var(--ink2);
  line-height: 1;
}
.layer-num-value {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -0.04em;
  line-height: 1;
}

.layer-meta {
  flex: 1;
  padding: 20px 26px 20px 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}
.layer-name {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.1;
}
.layer-desc {
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.4;
  max-width: 740px;
}
.layer-who {
  font-size: 10.5px;
  font-family: var(--mono);
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.layer-count {
  align-self: center;
  padding: 18px 22px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-left: 1px solid rgba(0,0,0,0.10);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  min-width: 110px;
}
.layer-count strong {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -0.02em;
}

/* Layer body — grid of boxes */
.layer-body {
  padding: 18px 22px 22px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
  gap: 12px;
}

/* ───────────────── BOX ───────────────── */
.box {
  text-align: left;
  background: #fff;
  border: 1px solid var(--rule);
  padding: 12px 13px 11px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  transition: border-color 90ms, box-shadow 90ms, transform 90ms;
  font: inherit;
  color: inherit;
  min-height: 158px;
}
.box:hover {
  border-color: var(--ink);
  box-shadow: 0 3px 14px rgba(0,0,0,0.12);
  transform: translateY(-1px);
  z-index: 1;
}
.box.soon { opacity: 0.55; }

.box-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.box-tag {
  font-family: var(--mono);
  font-size: 8.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 5px 2.5px;
  background: var(--ink);
  color: #fff;
  line-height: 1;
}

.box-status {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--ink);
  flex-shrink: 0;
}
.box.soon .box-status {
  background: transparent;
  border: 1.5px solid var(--ink2);
}

.box-name {
  font-size: 13.5px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
}
.box-sub {
  font-size: 11px;
  color: var(--ink2);
  line-height: 1.35;
}
.box-use {
  font-size: 11.5px;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.35;
  margin-top: 6px;
  padding: 6px 8px;
  background: rgba(0,0,0,0.06);
  border-left: 2px solid var(--ink);
  flex: 1;
}
.box-url {
  font-size: 9.5px;
  color: var(--ink3);
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 6px;
  padding-top: 7px;
  border-top: 1px solid var(--rule2);
}

/* ───────────────── JOURNEY MODAL ───────────────── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 4vh 16px;
  overflow-y: auto;
}
.modal-backdrop.open { display: flex; }
.modal {
  width: min(820px, 100%);
  background: #fff;
  border: 2px solid var(--ink);
  display: flex;
  flex-direction: column;
  max-height: 92vh;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border: 1px solid var(--rule);
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink2);
  z-index: 2;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans);
}
.modal-close:hover { border-color: var(--ink); color: var(--ink); }
.modal-body {
  overflow-y: auto;
  padding: 28px 32px 32px;
}
.m-eyebrow {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 6px;
}
.m-name {
  font-size: 30px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 4px;
}
.m-sub {
  font-size: 13px;
  color: var(--ink2);
  margin-bottom: 14px;
}
.m-use {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  padding: 10px 14px;
  background: rgba(0,0,0,0.06);
  border-left: 3px solid var(--ink);
  margin-bottom: 18px;
  line-height: 1.4;
}
.m-tag-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.m-tag {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 7px;
  background: var(--ink);
  color: #fff;
}
.m-tag.alt { background: #fff; color: var(--ink); border: 1px solid var(--ink); }
.m-url {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--ink);
  text-decoration: none;
  padding: 7px 12px;
  border: 1px solid var(--rule);
  background: #fafafa;
  margin-bottom: 24px;
  transition: border-color 90ms;
}
.m-url:hover { border-color: var(--ink); }
.m-url::after { content: '↗'; font-family: var(--sans); margin-left: 2px; }
.m-rule { height: 1px; background: var(--rule); margin: 24px 0 20px; }
.m-section-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.m-section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--rule);
}
.m-desc {
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 6px;
}
.m-who {
  font-size: 12px;
  color: var(--ink3);
  font-style: italic;
}
.path-list { display: flex; flex-direction: column; gap: 8px; }
.path-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--rule);
  background: #fff;
  font-size: 12.5px;
  cursor: pointer;
  transition: border-color 90ms, background 90ms;
}
.path-item.ext { cursor: default; background: var(--rule3); }
.path-item:not(.ext):hover { border-color: var(--ink); background: #fafafa; }
.path-arrow { font-family: var(--mono); color: var(--ink3); font-size: 14px; }
.path-layer-tag {
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.08em;
  padding: 2px 6px; background: var(--ink); color: #fff;
  font-family: var(--mono);
}
.path-layer-tag.ext-tag { background: #fff; color: var(--ink3); border: 1px solid var(--rule); }
.path-name { font-weight: 700; color: var(--ink); }
.path-detail { color: var(--ink3); flex: 1; font-size: 11.5px; }
.steps { position: relative; margin-left: 4px; }
.step {
  display: flex; gap: 14px; padding: 4px 0; position: relative;
}
.step:not(:last-child) .step-num::after {
  content: ''; position: absolute;
  left: 50%; top: 26px; bottom: -10px;
  width: 1px; background: var(--rule);
  transform: translateX(-50%);
}
.step-num {
  width: 24px; height: 24px; min-width: 24px;
  border: 1px solid var(--ink); background: #fff; color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700; font-family: var(--mono);
  position: relative; border-radius: 50%;
}
.step.warn .step-num { background: var(--ink); color: #fff; }
.step-text {
  flex: 1; font-size: 12.5px; line-height: 1.5; color: var(--ink);
  padding-top: 4px; padding-bottom: 14px;
}
.step.warn .step-text { color: var(--warn-tx); font-weight: 500; }
.friction { display: flex; flex-direction: column; gap: 8px; }
.friction-item {
  padding: 10px 12px 10px 14px;
  background: var(--warn-bg); border: 1px solid var(--warn-bd);
  border-left-width: 3px;
  font-size: 12.5px; line-height: 1.45; color: var(--warn-tx);
}
.friction-item::before { content: '⚠  '; font-weight: 800; }

/* ─── New workflow-style modal stages ─── */
.m-workflow-banner {
  margin: 32px 0 4px;
  padding: 10px 14px;
  background: var(--ink);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-align: center;
}
.m-stage {
  margin-top: 22px;
  padding: 18px;
  border: 1.5px solid var(--rule);
  background: #fff;
}
.m-stage-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule2);
}
.m-stage-num {
  width: 30px; height: 30px; min-width: 30px;
  background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 13px;
  font-family: var(--mono);
  border-radius: 50%;
}
.m-stage-num.info { background: #fff; color: var(--ink); border: 2px solid var(--ink); font-style: italic; }
.m-stage-num.warn { background: #b66800; color: #fff; }
.m-stage-label {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink);
  flex: 1;
}
.m-stage-tag {
  font-size: 10px;
  color: var(--ink3);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.m-flow-arrow {
  text-align: center;
  font-size: 22px;
  color: var(--ink2);
  margin: 0;
  line-height: 1;
  padding: 6px 0;
  font-family: var(--mono);
}
.m-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.m-card {
  padding: 12px 14px;
  border: 1.5px solid var(--rule);
  background: #fafafa;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 5px;
  transition: border-color 90ms, background 90ms;
}
.m-card.ext { cursor: default; }
.m-card:not(.ext):hover { border-color: var(--ink); background: #fff; }
.m-card-name {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink);
}
.m-card-detail {
  font-size: 11px;
  color: var(--ink3);
  padding-left: 30px;
}
.m-steps-list {
  display: flex; flex-direction: column; gap: 8px;
  position: relative;
}
.m-step {
  display: flex; gap: 14px;
  padding: 12px 14px;
  border: 1.5px solid var(--rule);
  background: #fff;
  align-items: flex-start;
}
.m-step.warn {
  background: var(--warn-bg);
  border-color: var(--warn-bd);
  border-left-width: 3px;
}
.m-step-num {
  width: 28px; height: 28px; min-width: 28px;
  background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-family: var(--mono); font-size: 12px;
  border-radius: 50%;
}
.m-step.warn .m-step-num { background: #b66800; }
.m-step-text {
  flex: 1; font-size: 13px; line-height: 1.5; color: var(--ink);
  padding-top: 4px;
}
.m-step.warn .m-step-text { color: var(--warn-tx); font-weight: 500; }

/* ───────────────── RESPONSIVE ───────────────── */
@media (max-width: 760px) {
  .hdr { padding: 12px 14px; gap: 12px; }
  .hdr-title, .hdr-hint { display: none; }
  .rail { width: 52px; }
  .rail-item { font-size: 14px; height: 44px; }
  .layer-num { width: 70px; height: 56px; top: 10px; left: 12px; gap: 2px; }
  .layer-num-label { font-size: 8px; letter-spacing: 0.14em; }
  .layer-num-value { font-size: 28px; }
  .layer-meta { padding: 14px 16px 14px 94px; }
  .layer-name { font-size: 14px; }
  .layer-count { display: none; }
  .layer-body { padding: 12px 14px 16px; gap: 10px; }
  .modal-body { padding: 20px 18px 24px; }
  .m-name { font-size: 24px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">NVIDIA</div>
  <div class="hdr-title">Developer Stack · Layered Journey Map</div>
  <div class="hdr-spacer"></div>
  <div class="hdr-hint">Click any component to see the developer journey</div>
  <div class="hdr-count"><strong>10</strong> layers</div>
</div>

<div class="main">
  <nav class="rail" id="rail">
    <div class="rail-heading">Stack</div>
    <a class="rail-item top" data-jump="10">10</a>
    <a class="rail-item" data-jump="09">09</a>
    <a class="rail-item" data-jump="08">08</a>
    <a class="rail-item" data-jump="07">07</a>
    <a class="rail-item" data-jump="06">06</a>
    <a class="rail-item" data-jump="05">05</a>
    <a class="rail-item" data-jump="04">04</a>
    <a class="rail-item" data-jump="03">03</a>
    <a class="rail-item" data-jump="02">02</a>
    <a class="rail-item" data-jump="01">01</a>
  </nav>

  <div class="stack-wrap" id="stackWrap">
    <div class="stack" id="stack"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════

Object.keys(BOX_ORDER).forEach(layerId => {
  if (!LAYERS[layerId]) return;
  const order = BOX_ORDER[layerId];
  LAYERS[layerId].boxes.sort((a, b) => {
    const ai = order.indexOf(a.name); const bi = order.indexOf(b.name);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
});

// RENDER

const stack = document.getElementById('stack');
const stackWrap = document.getElementById('stackWrap');
const rail = document.getElementById('rail');
const modalBackdrop = document.getElementById('modalBackdrop');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');

function render() {
  stack.innerHTML = '';
  LAYER_ORDER.forEach(layerId => {
    const layer = LAYERS[layerId];
    const sec = document.createElement('section');
    sec.className = 'layer';
    sec.dataset.id = layerId;
    sec.id = 'l' + layerId;

    const count = layer.boxes.length;
    sec.innerHTML = `
      <div class="layer-head">
        <div class="layer-num"><span class="layer-num-label">LAYER</span><span class="layer-num-value">${layerId}</span></div>
        <div class="layer-meta">
          <div class="layer-name">${layer.name}</div>
          <div class="layer-desc">${layer.desc}</div>
          <div class="layer-who">For: ${layer.who}</div>
        </div>
        <div class="layer-count"><strong>${count}</strong>components</div>
      </div>
      <div class="layer-body" id="body-${layerId}"></div>
    `;
    stack.appendChild(sec);

    const body = sec.querySelector('.layer-body');
    layer.boxes.forEach((b, idx) => {
      const el = document.createElement('button');
      el.className = 'box' + (b.soon ? ' soon' : '');
      el.dataset.layer = layerId;
      el.dataset.idx = idx;
      el.dataset.name = b.name;
      el.type = 'button';
      el.innerHTML = `
        <div class="box-top">
          <span class="box-tag">${b.type || ''}</span>
          <span class="box-status"></span>
        </div>
        <div class="box-name">${b.name}</div>
        <div class="box-sub">${b.sub}</div>
        ${b.use ? `<div class="box-use">${b.use}</div>` : ''}
        <div class="box-url">${b.url.replace(/^https?:\/\//,'')}</div>
      `;
      el.addEventListener('click', () => openModal(layerId, idx));
      body.appendChild(el);
    });
  });
}

function navigateToBox(layerId, name) {
  const layer = LAYERS[layerId];
  if (!layer) return;
  const idx = layer.boxes.findIndex(b => b.name === name);
  if (idx < 0) return;
  const sec = document.getElementById('l' + layerId);
  if (sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(() => openModal(layerId, idx), 200);
}

function openModal(layerId, idx) {
  const layer = LAYERS[layerId];
  const box = layer.boxes[idx];
  const cleanUrl = box.url.replace(/^https?:\/\//,'');

  let html = `
    <div class="m-eyebrow">Layer ${layerId} · ${layer.name}${box.soon ? ' · COMING SOON' : ''}</div>
    <div class="m-name">${box.name}</div>
    <div class="m-sub">${box.sub}</div>
    ${box.use ? `<div class="m-use">${box.use}</div>` : ''}
    <div class="m-tag-row">
      ${box.type ? `<span class="m-tag">${box.type}</span>` : ''}
      <span class="m-tag alt">${box.soon ? '○ Coming Soon' : '● GA'}</span>
    </div>
    <a class="m-url" href="https://${cleanUrl}" target="_blank" rel="noopener">${cleanUrl}</a>
  `;

  // STAGE: What it is
  if (box.desc) {
    html += `
      <div class="m-stage">
        <div class="m-stage-header">
          <div class="m-stage-num info">i</div>
          <div class="m-stage-label">What it is</div>
        </div>
        <div class="m-desc">${box.desc}</div>
        ${box.who ? `<div class="m-who">For: ${box.who}</div>` : ''}
      </div>
    `;
  }

  const hasArrive = box.arriveFrom && box.arriveFrom.length;
  const hasSteps = box.steps && box.steps.length;
  const hasGo = box.goTo && box.goTo.length;
  const hasFlow = hasArrive || hasSteps || hasGo;

  if (hasFlow) {
    html += `<div class="m-workflow-banner">The Journey</div>`;
  }

  if (hasArrive) {
    html += `
      <div class="m-stage">
        <div class="m-stage-header">
          <div class="m-stage-num">1</div>
          <div class="m-stage-label">How you get here</div>
          <div class="m-stage-tag">${box.arriveFrom.length} entry ${box.arriveFrom.length === 1 ? 'point' : 'points'}</div>
        </div>
        <div class="m-cards">${box.arriveFrom.map(renderCardArrive).join('')}</div>
      </div>
    `;
    if (hasSteps || hasGo) html += `<div class="m-flow-arrow">▼</div>`;
  }

  if (hasSteps) {
    html += `
      <div class="m-stage">
        <div class="m-stage-header">
          <div class="m-stage-num">2</div>
          <div class="m-stage-label">What you actually do</div>
          <div class="m-stage-tag">${box.steps.length} steps</div>
        </div>
        <div class="m-steps-list">
          ${box.steps.map((s, i) => {
            const isWarn = /⚠|fail|error|wait|miss|stuck|block|401|permission/i.test(s);
            return `<div class="m-step${isWarn ? ' warn' : ''}">
              <div class="m-step-num">${i+1}</div>
              <div class="m-step-text">${s}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
    if (hasGo) html += `<div class="m-flow-arrow">▼</div>`;
  }

  if (hasGo) {
    html += `
      <div class="m-stage">
        <div class="m-stage-header">
          <div class="m-stage-num">3</div>
          <div class="m-stage-label">Where you go next</div>
          <div class="m-stage-tag">${box.goTo.length} ${box.goTo.length === 1 ? 'destination' : 'destinations'}</div>
        </div>
        <div class="m-cards">${box.goTo.map(renderCardGo).join('')}</div>
      </div>
    `;
  }

  if (box.friction && box.friction.length) {
    html += `
      <div class="m-stage">
        <div class="m-stage-header">
          <div class="m-stage-num warn">!</div>
          <div class="m-stage-label">Gotchas</div>
        </div>
        <div class="friction">${box.friction.map(f => `<div class="friction-item">${f}</div>`).join('')}</div>
      </div>
    `;
  }

  modalBody.innerHTML = html;
  modalBackdrop.classList.add('open');
  modalBody.scrollTop = 0;

  modalBody.querySelectorAll('[data-nav-layer]').forEach(item => {
    item.addEventListener('click', () => {
      const navLayer = item.dataset.navLayer;
      const navName = item.dataset.navName;
      closeModal();
      setTimeout(() => navigateToBox(navLayer, navName), 80);
    });
  });
}

function closeModal() {
  modalBackdrop.classList.remove('open');
}

modalClose.addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e) => {
  if (e.target === modalBackdrop) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalBackdrop.classList.contains('open')) closeModal();
});

// Rail navigation
rail.addEventListener('click', (e) => {
  const item = e.target.closest('[data-jump]');
  if (!item) return;
  const layerId = item.dataset.jump;
  const sec = document.getElementById('l' + layerId);
  if (sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
});

// Highlight active layer in rail as user scrolls
const railItems = Array.from(rail.querySelectorAll('[data-jump]'));
function updateActiveRail() {
  const wrapTop = stackWrap.getBoundingClientRect().top;
  let active = railItems[0];
  for (const item of railItems) {
    const sec = document.getElementById('l' + item.dataset.jump);
    if (!sec) continue;
    const r = sec.getBoundingClientRect();
    if (r.top - wrapTop <= 80) active = item;
  }
  railItems.forEach(i => i.classList.toggle('active', i === active));
}
stackWrap.addEventListener('scroll', updateActiveRail);

render();
updateActiveRail();
</script>
</body>
</html>
